name: PR Status Check

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  comment:
    name: Post CI status comment
    runs-on: ubuntu-latest
    steps:
      - name: Post comment with CI info
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const ciRun = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
              workflow: 'CI.yml',
              per_page: 1,
            });
            const run = ciRun.data.workflow_runs[0];
            const runUrl = run ? run.html_url : '';
            const body = `### CI Status

            | Check | Status |
            |-------|--------|
            | Lint | ${run && run.conclusion === 'success' ? '✅' : '⏳'} [View run](${runUrl}) |
            | Test | ${run && run.conclusion === 'success' ? '✅' : '⏳'} |
            | Build | ${run && run.conclusion === 'success' ? '✅' : '⏳'} |

            _Auto-updated by CI workflow._`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
